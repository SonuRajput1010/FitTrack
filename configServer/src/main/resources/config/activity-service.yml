spring:
  data:
    mongodb:
      uri: ${ACTIVITY_MONGODB_URI:mongodb://localhost:27017/Fitness_Activity}
      database: ${ACTIVITY_MONGODB_DATABASE:Fitness_Activity}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

rabbitmq:
  exchange:
    name: ${RABBITMQ_EXCHANGE_NAME:fitness.exchange}
  queue:
    name: ${RABBITMQ_ACTIVITY_QUEUE:activity.queue}
  routing:
    key: ${RABBITMQ_ACTIVITY_ROUTING_KEY:activity.tracking}

server:
  port: ${ACTIVITY_SERVICE_PORT:8082}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}