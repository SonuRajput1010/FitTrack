server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8181/realms/Fitness-oauth2/protocol/openid-connect/certs}

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: user-service
              uri: ${USER_SERVICE_URI:lb://USER-SERVICE}
              predicates:
                - Path=/api/users/**

            - id: activity-service
              uri: ${ACTIVITY_SERVICE_URI:lb://ACTIVITY-SERVICE}
              predicates:
                - Path=/api/activities/**

            - id: ai-service
              uri: ${AI_SERVICE_URI:lb://AI-SERVICE}
              predicates:
                - Path=/api/recommendations/**

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:5174

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}